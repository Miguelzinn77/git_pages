<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap-5.3.8/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <main>
        <div class="container bg-primar height: 200px; border border-danger m-2 text-center">
            <!-- toda row ja tem display-flex -->
            <div class="row justify-content-around m-2">
                <div class="col-2 border border-warning p-3">
                    50% desktop, 100% mobile
                </div>
                <div class="col-2 border border-warning p-3 co">
                    50% desktop, 100% mobile
                </div>
                <div class="col-2 border border-warning p-3 co">
                    50% desktop, 100% mobile
                </div>
            </div>
            <a href="https://wa.me/1234567890" target="_blank" class="btn btn-success">
                <i class="bi bi-whatsapp">Contato via WhatsApp</i>
            </a>
    </main>


    <!-- RESPOSIVIDADE -->

    <!-- Bootstrap segue a abordagem **mobile first**.

Isso significa que:

1. você define primeiro o layout para celular
2. depois melhora/adapta para telas maiores -->
    <main class="container-lg border border-3 border-dark">
        <!-- - sem prefixo → celular
     - md → tablet
     - lg → desktop -->
        <h1 class="text-center text-end sn-center">responsividade</h1>

        <div class="d-none d-md-block">
            <p>Este conteúdo só será exibido em telas médias e maiores.</p>
        </div>
        <!-- esconde o conteudo -->
        <div class="d-md-block d-none">
            <p>Este conteúdo só será exibido em telas médias e maiores.</p>
        </div>

        <div class="row border border-danger m-2">
            <!-- RESPONSIVO TELA DE CELULAR DESKTOP E TABLET -->
            <div class="col-md-6 col-lg-3">item 1</div>
            <div class="col-md-6 col-lg-3">item 2</div>
            <div class="col-md-6 col-lg-3">item 3</div>
            <div class="col-md-6 col-lg-3">item 4</div>

        </div>

    </main>



</body>

</html>
